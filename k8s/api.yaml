apiVersion: v1
kind: Service
metadata:
  name: dashboard-api
  namespace: news-pipeline
  labels:
    app: dashboard-api
spec:
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: dashboard-api

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-api
  namespace: news-pipeline
  labels:
    app: dashboard-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-api
  template:
    metadata:
      labels:
        app: dashboard-api
    spec:
      containers:
        - name: api
          image: news-pipeline-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: news-pipeline-config
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: hf-cache
              mountPath: /app/.hf_cache
          livenessProbe:
            httpGet:
              path: /api/pipeline-status
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/pipeline-status
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dashboard-data
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dashboard-data
  namespace: news-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hf-cache
  namespace: news-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: news-pipeline
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: news-pipeline.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-api
                port:
                  number: 8000
