apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: news-pipeline
  labels:
    app: minio
spec:
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    app: minio

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: news-pipeline
  labels:
    app: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: MINIO_SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: news-pipeline
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until wget -q -O- http://minio:9000/minio/health/live; do sleep 2; done"
      containers:
        - name: setup
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              mc alias set localminio http://minio:9000 admin password
              mc mb localminio/bronze || true
              mc mb localminio/silver || true
              mc mb localminio/gold || true
              mc anonymous set public localminio/bronze
              mc anonymous set public localminio/silver
              mc anonymous set public localminio/gold
              echo "Buckets created"
