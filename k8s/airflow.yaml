apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: news-pipeline
  labels:
    app: airflow-webserver
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: airflow-webserver

---
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: news-pipeline
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: apache/airflow:2.9.1-python3.11
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: AIRFLOW__CORE__EXECUTOR
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: AIRFLOW__CORE__LOAD_EXAMPLES
          command:
            - bash
            - -c
            - |
              pip install -r /opt/airflow/requirements.txt
              airflow db upgrade
              airflow users create \
                --role Admin --username admin --password admin \
                --email admin@example.com --firstname admin --lastname admin || true
          volumeMounts:
            - name: requirements
              mountPath: /opt/airflow/requirements.txt
              subPath: requirements.txt
      volumes:
        - name: requirements
          configMap:
            name: airflow-requirements

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-requirements
  namespace: news-pipeline
data:
  requirements.txt: |
    pandas>=2.0
    pyarrow>=14.0
    fastparquet>=2024.0
    requests>=2.31
    beautifulsoup4>=4.12
    feedparser>=6.0
    langdetect>=1.0.9
    duckdb>=0.10
    minio>=7.2
    kafka-python>=2.0
    fastapi>=0.109
    uvicorn>=0.27
    pydantic>=2.0
    torch>=2.0 --index-url https://download.pytorch.org/whl/cpu
    bertopic>=0.16
    sentence-transformers>=2.5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: news-pipeline
  labels:
    app: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: webserver
          image: apache/airflow:2.9.1-python3.11
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: AIRFLOW__CORE__EXECUTOR
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: AIRFLOW__CORE__LOAD_EXAMPLES
          command:
            - bash
            - -c
            - |
              pip install -r /opt/airflow/requirements.txt
              exec airflow webserver
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: requirements
              mountPath: /opt/airflow/requirements.txt
              subPath: requirements.txt
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: dags
          configMap:
            name: airflow-dags
        - name: requirements
          configMap:
            name: airflow-requirements

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: news-pipeline
  labels:
    app: airflow-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
        - name: scheduler
          image: apache/airflow:2.9.1-python3.11
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: AIRFLOW__CORE__EXECUTOR
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              valueFrom:
                configMapKeyRef:
                  name: news-pipeline-config
                  key: AIRFLOW__CORE__LOAD_EXAMPLES
          command:
            - bash
            - -c
            - |
              pip install -r /opt/airflow/requirements.txt
              exec airflow scheduler
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: requirements
              mountPath: /opt/airflow/requirements.txt
              subPath: requirements.txt
      volumes:
        - name: dags
          configMap:
            name: airflow-dags
        - name: requirements
          configMap:
            name: airflow-requirements

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-dags
  namespace: news-pipeline
data:
  batch_dag.py: |
    from datetime import datetime, timedelta
    from airflow import DAG
    from airflow.operators.bash import BashOperator

    default_args = {
        "owner": "news-pipeline",
        "depends_on_past": False,
        "retries": 1,
        "retry_delay": timedelta(minutes=5),
    }

    with DAG(
        dag_id="news_ingestion_batch",
        default_args=default_args,
        description="Pipeline News Bronze → Silver → Gold",
        schedule_interval="0 */6 * * *",
        start_date=datetime(2025, 1, 1),
        catchup=False,
        tags=["news", "pipeline"],
    ) as dag:

        run_pipeline = BashOperator(
            task_id="run_full_pipeline",
            bash_command="cd /opt/airflow && python run_full_pipeline.py --source bbc cnn --no-polymarket",
        )
