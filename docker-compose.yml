version: '3.8'

services:
  # ==========================================
  # DATA LAKE : MinIO
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: news_minio
    ports:
      - "9000:9000"  # API Port
      - "9001:9001"  # Console Port
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - news_network

  minio-setup:
    image: minio/mc:latest
    container_name: news_minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set localminio http://minio:9000 admin password;
      mc mb localminio/bronze || true;
      mc mb localminio/silver || true;
      mc mb localminio/gold || true;
      mc anonymous set public localminio/bronze;
      mc anonymous set public localminio/silver;
      mc anonymous set public localminio/gold;
      exit 0;
      "
    networks:
      - news_network

  # ==========================================
  # STREAMING : Kafka (KRaft mode)
  # ==========================================
  kafka:
    image: bitnami/kafka:3.5
    container_name: news_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - news_network

  # ==========================================
  # ORCHESTRATION : Airflow (Lightweight)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: news_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - news_network

  airflow-webserver:
    image: apache/airflow:2.9.1-python3.11
    container_name: news_airflow_web
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_DB_UPGRADE=True
      - _AIRFLOW_WWW_USER_CREATE=True
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./scrapers:/opt/airflow/scrapers
      - ./datalake:/opt/airflow/datalake
      - ./ingestion:/opt/airflow/ingestion
      - ./requirements.txt:/requirements.txt
    ports:
      - "8080:8080"
    command: >
      bash -c "
      pip install -r /requirements.txt &&
      airflow db upgrade &&
      airflow users create --role Admin --username admin --password admin --email admin@example.com --firstname admin --lastname admin &&
      airflow webserver
      "
    networks:
      - news_network

  airflow-scheduler:
    image: apache/airflow:2.9.1-python3.11
    container_name: news_airflow_scheduler
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./scrapers:/opt/airflow/scrapers
      - ./datalake:/opt/airflow/datalake
      - ./ingestion:/opt/airflow/ingestion
      - ./requirements.txt:/requirements.txt
    command: >
      bash -c "
      pip install -r /requirements.txt &&
      airflow scheduler
      "
    networks:
      - news_network

  # ==========================================
  # DASHBOARD : Streamlit
  # ==========================================
  dashboard:
    image: python:3.11-slim
    container_name: news_dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - WAREHOUSE_PATH=/data/warehouse/news_warehouse.duckdb
    volumes:
      - ./:/app
      - ./data:/data
    working_dir: /app
    command: >
      bash -c "
      pip install -r requirements.txt &&
      streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
      "
    networks:
      - news_network

volumes:
  minio_data:
  kafka_data:
  postgres_data:

networks:
  news_network:
    driver: bridge
