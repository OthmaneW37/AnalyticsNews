version: '3.8'

services:
  # ==========================================
  # DATA LAKE : MinIO
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: news_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - news_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    container_name: news_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set localminio http://minio:9000 admin password;
      mc mb localminio/bronze || true;
      mc mb localminio/silver || true;
      mc mb localminio/gold || true;
      mc anonymous set public localminio/bronze;
      mc anonymous set public localminio/silver;
      mc anonymous set public localminio/gold;
      exit 0;
      "
    networks:
      - news_network

  # ==========================================
  # STREAMING : Kafka (KRaft mode)
  # ==========================================
  kafka:
    image: bitnamilegacy/kafka:3.5
    container_name: news_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - news_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # ORCHESTRATION : Airflow
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: news_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - news_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.9.1-python3.11
    container_name: news_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./scrapers:/opt/airflow/scrapers
      - ./datalake:/opt/airflow/datalake
      - ./ingestion:/opt/airflow/ingestion
      - ./warehouse:/opt/airflow/warehouse
      - ./run_full_pipeline.py:/opt/airflow/run_full_pipeline.py
      - ./requirements.txt:/requirements.txt
    command: >
      bash -c "
      pip install -r /requirements.txt &&
      airflow db upgrade &&
      airflow users create --role Admin --username admin --password admin --email admin@example.com --firstname admin --lastname admin || true
      "
    networks:
      - news_network

  airflow-webserver:
    image: apache/airflow:2.9.1-python3.11
    container_name: news_airflow_web
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./scrapers:/opt/airflow/scrapers
      - ./datalake:/opt/airflow/datalake
      - ./ingestion:/opt/airflow/ingestion
      - ./warehouse:/opt/airflow/warehouse
      - ./run_full_pipeline.py:/opt/airflow/run_full_pipeline.py
      - ./requirements.txt:/requirements.txt
    ports:
      - "8080:8080"
    command: >
      bash -c "
      pip install -r /requirements.txt &&
      airflow webserver
      "
    networks:
      - news_network

  airflow-scheduler:
    image: apache/airflow:2.9.1-python3.11
    container_name: news_airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./scrapers:/opt/airflow/scrapers
      - ./datalake:/opt/airflow/datalake
      - ./ingestion:/opt/airflow/ingestion
      - ./warehouse:/opt/airflow/warehouse
      - ./run_full_pipeline.py:/opt/airflow/run_full_pipeline.py
      - ./requirements.txt:/requirements.txt
    command: >
      bash -c "
      pip install -r /requirements.txt &&
      airflow scheduler
      "
    networks:
      - news_network

  # ==========================================
  # API : FastAPI + Dashboard
  # ==========================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news_dashboard
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - WAREHOUSE_PATH=/app/data/warehouse/news_warehouse.duckdb
      - MINIO_ENDPOINT=minio:9000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./data:/app/data
      - ./.hf_cache:/app/.hf_cache
    depends_on:
      - minio
      - kafka
    networks:
      - news_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/pipeline-status"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
  kafka_data:
  postgres_data:

networks:
  news_network:
    driver: bridge
