<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Intelligence Dashboard — React</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0b0a1f;--bg2:#13122b;--card:#1a1932;--cardh:#222144;--accent:#4f46e5;--cyan:#06b6d4;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--txt:#e2e8f0;--txt2:#94a3b8;--muted:#64748b;--border:rgba(255,255,255,0.06);}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;height:100vh;}
  #root{height:100vh;display:flex;}
  .sidebar{width:260px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-right:1px solid var(--border);padding:1.5rem;display:flex;flex-direction:column;gap:1.2rem;overflow-y:auto;}
  .sidebar h2{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .sidebar h3{font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:0.5rem;}
  .sidebar label{font-size:0.82rem;color:var(--txt2);display:flex;align-items:center;gap:0.5rem;cursor:pointer;padding:0.3rem 0;}
  .sidebar label:hover{color:var(--cyan);}
  .sidebar input[type=checkbox]{accent-color:var(--accent);}
  .sidebar .date-inp{background:var(--card);border:1px solid var(--border);color:var(--txt);padding:0.5rem;border-radius:8px;width:100%;font-family:inherit;}
  .sidebar .about{font-size:0.78rem;color:var(--muted);line-height:1.6;margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .main-scroll{flex:1;overflow-y:auto;padding:1.5rem 2rem;}
  .header{background:linear-gradient(135deg,#161538,#1e1d42);border:1px solid var(--border);border-radius:16px;padding:1.5rem 2rem;text-align:center;margin-bottom:1.5rem;position:relative;overflow:hidden;}
  .header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 50%,rgba(79,70,229,0.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 50%,rgba(6,182,212,0.06) 0%,transparent 50%);pointer-events:none;}
  .header h1{font-size:1.8rem;font-weight:900;letter-spacing:-1px;position:relative;}
  .header p{color:var(--txt2);font-size:0.9rem;margin-top:0.3rem;position:relative;}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .kpi-card{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:1.2rem;text-align:center;transition:all 0.3s ease;cursor:pointer;}
  .kpi-card:hover{transform:translateY(-4px);border-color:rgba(79,70,229,0.3);box-shadow:0 8px 30px rgba(0,0,0,0.3);}
  .kpi-card .icon{font-size:1.8rem;margin-bottom:0.3rem;}
  .kpi-card .val{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#fff,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .kpi-card .lab{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:0.3rem;font-weight:600;}
  .sec-title{font-size:1rem;font-weight:700;color:#fff;margin:1.5rem 0 0.8rem;padding:0.4rem 1rem;background:linear-gradient(90deg,rgba(79,70,229,0.15),transparent);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;display:flex;align-items:center;gap:0.5rem;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;}
  @media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr;}}
  .card-box{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:1.2rem;}
  .insight{display:flex;align-items:flex-start;gap:0.8rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0.9rem 1rem;transition:all 0.3s;}
  .insight:hover{border-color:rgba(79,70,229,0.25);transform:translateX(3px);}
  .insight .ic{font-size:1.4rem;flex-shrink:0;}
  .insight .tx{font-size:0.82rem;color:var(--txt2);line-height:1.5;}
  .insight .tx strong{color:var(--txt);}
  .topic-row{display:flex;align-items:center;gap:0.8rem;margin:0.35rem 0;font-size:0.82rem;}
  .topic-row .name{flex:1;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topic-row .bar{flex:1.5;height:10px;background:rgba(255,255,255,0.05);border-radius:5px;overflow:hidden;position:relative;}
  .topic-row .bar-in{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width 1s ease;}
  .topic-row .num{color:var(--txt);font-weight:700;min-width:28px;text-align:right;}
  .poly-legend{display:flex;gap:1rem;margin-bottom:0.8rem;font-size:0.72rem;color:var(--muted);}
  .poly-legend span{display:flex;align-items:center;gap:0.3rem;}
  .poly-legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .poly-card{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:0.7rem;transition:all 0.3s;}
  .poly-card:hover{border-color:rgba(79,70,229,0.2);transform:translateX(3px);}
  .poly-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem;}
  .poly-topic{font-size:0.85rem;font-weight:700;color:var(--txt);}
  .poly-badge{font-size:0.7rem;font-weight:600;padding:0.15rem 0.5rem;border-radius:20px;border:1px solid;}
  .poly-bar-wrap{display:flex;align-items:center;gap:0.8rem;}
  .poly-track{flex:1;height:10px;background:rgba(255,255,255,0.05);border-radius:5px;overflow:hidden;}
  .poly-fill{height:100%;border-radius:5px;transition:width 1s ease;}
  .poly-val{font-size:1.1rem;font-weight:800;white-space:nowrap;}
  .poly-q{font-size:0.75rem;color:var(--muted);margin-top:0.3rem;font-style:italic;}
  .pie-wrap{display:flex;align-items:center;justify-content:center;gap:1.5rem;}
  .pie{width:140px;height:140px;border-radius:50%;position:relative;}
  .pie-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90px;height:90px;background:var(--card);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:var(--muted);text-align:center;}
  .pie-legend{display:flex;flex-direction:column;gap:0.4rem;}
  .pie-leg-item{display:flex;align-items:center;gap:0.4rem;font-size:0.8rem;color:var(--txt2);}
  .pie-leg-dot{width:10px;height:10px;border-radius:3px;}
  .tl-wrap{display:flex;align-items:flex-end;gap:4px;height:120px;padding:0.5rem 0;}
  .tl-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .tl-bar{width:100%;background:linear-gradient(180deg,var(--accent),var(--cyan));border-radius:4px 4px 0 0;min-height:4px;transition:height 1s ease;}
  .tl-label{font-size:0.65rem;color:var(--muted);transform:rotate(-35deg);transform-origin:top left;white-space:nowrap;margin-top:4px;}
  .tbl{width:100%;border-collapse:collapse;font-size:0.82rem;border-radius:12px;overflow:hidden;}
  .tbl thead{background:linear-gradient(135deg,var(--accent),#3730a3);}
  .tbl th{padding:0.7rem 1rem;text-align:left;font-weight:700;color:#fff;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;}
  .tbl td{padding:0.6rem 1rem;color:var(--txt2);border-bottom:1px solid var(--border);}
  .tbl tr:hover td{background:var(--cardh);}
  .tbl td:first-child{font-weight:600;color:var(--txt);}
  .status-ok{color:var(--green);font-weight:700;}
  .status-fail{color:var(--red);font-weight:700;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .anim{animation:fadeIn 0.5s ease forwards;opacity:0;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(79,70,229,0.3);border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(79,70,229,0.5);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ─── MOCK DATA ─────────────────────────────────────────────
const ALL_SOURCES = ["hespress","bbc","gdelt","akhbarona","lakom","barlamane","aljazeera","cnn","reuters"];
const SOURCE_NAMES = {hespress:"Hespress 🇲🇦",bbc:"BBC 🇬🇧",gdelt:"GDELT 🌍",akhbarona:"Akhbarona 🇲🇦",lakom:"Lakom 🇲🇦",barlamane:"Barlamane 🇲🇦",aljazeera:"Al Jazeera 🇶🇦",cnn:"CNN 🇺🇸",reuters:"Reuters 🇺🇸"};

const MOCK_ARTICLES = [
  {id:"1",titre:"Le Maroc annonce une réforme économique majeure",source:"hespress",source_key:"hespress",langue:"fr",date:"2025-05-11T08:00:00",topic:"maroc_economie_reforme",topic_r:"Maroc / Economie / Réforme",poly_prob:0.72,poly_q:"Will Morocco pass major economic reform in 2025?",quality:"OK"},
  {id:"2",titre:"UK economy grows by 0.5% in last quarter",source:"bbc",source_key:"bbc",langue:"en",date:"2025-05-11T09:00:00",topic:"uk_economy_growth",topic_r:"UK / Economie / Croissance",poly_prob:0.58,poly_q:"Will UK GDP grow >0.3% in Q2 2025?",quality:"OK"},
  {id:"3",titre:"Gaza ceasefire negotiations enter new phase",source:"aljazeera",source_key:"aljazeera",langue:"en",date:"2025-05-11T10:00:00",topic:"gaza_israel_ceasefire",topic_r:"Gaza / Israël / Cessez-le-feu",poly_prob:0.68,poly_q:"Will Gaza ceasefire be reached by June 2025?",quality:"OK"},
  {id:"4",titre:"Trump announces new tariffs on European goods",source:"cnn",source_key:"cnn",langue:"en",date:"2025-05-11T11:00:00",topic:"us_trade_tariffs",topic_r:"US / Commerce / Tarifs",poly_prob:0.45,poly_q:"Will Trump impose new EU tariffs in 2025?",quality:"OK"},
  {id:"5",titre:"Le gouvernement lance un plan pour les énergies renouvelables",source:"lakom",source_key:"lakom",langue:"fr",date:"2025-05-11T08:30:00",topic:"maroc_energie_renouvelable",topic_r:"Maroc / Énergie / Renouvelable",poly_prob:0.82,poly_q:"Will Morocco reach 52% renewable energy by 2030?",quality:"OK"},
  {id:"6",titre:"Brexit negotiations continue with new developments",source:"bbc",source_key:"bbc",langue:"en",date:"2025-05-11T09:30:00",topic:"uk_economy_growth",topic_r:"UK / Economie / Croissance",poly_prob:0.58,poly_q:"Will UK GDP grow >0.3% in Q2 2025?",quality:"OK"},
  {id:"7",titre:"Saudi Arabia hosts major economic summit",source:"reuters",source_key:"reuters",langue:"en",date:"2025-05-11T12:00:00",topic:"saudi_economie_sommet",topic_r:"Arabie Saoudite / Économie / Sommet",poly_prob:0.35,poly_q:"Will Saudi non-oil exports exceed $100B in 2025?",quality:"OK"},
  {id:"8",titre:"Nouvelle vague de chaleur record au Maroc",source:"hespress",source_key:"hespress",langue:"fr",date:"2025-05-11T07:00:00",topic:"maroc_climat_chaleur",topic_r:"Maroc / Climat / Canicule",poly_prob:0.28,poly_q:"Will Morocco break heat records in summer 2025?",quality:"OK"},
  {id:"9",titre:"Elections anticipées en France : analyse",source:"akhbarona",source_key:"akhbarona",langue:"fr",date:"2025-05-11T10:30:00",topic:"france_elections",topic_r:"France / Élections / Politique",poly_prob:0.55,poly_q:"Will France hold snap elections in 2025?",quality:"OK"},
  {id:"10",titre:"Qatar invests heavily in African infrastructure",source:"aljazeera",source_key:"aljazeera",langue:"en",date:"2025-05-11T13:00:00",topic:"qatar_afrique_investissement",topic_r:"Qatar / Afrique / Investissement",poly_prob:0.62,poly_q:"Will Qatar invest >$5B in Africa by 2026?",quality:"OK"},
  {id:"11",titre:"Les stocks de blé atteignent un niveau critique",source:"barlamane",source_key:"barlamane",langue:"fr",date:"2025-05-11T06:00:00",topic:"maroc_agriculture_ble",topic_r:"Maroc / Agriculture / Blé",poly_prob:0.41,poly_q:"Will wheat prices rise >20% in 2025?",quality:"OK"},
  {id:"12",titre:"Tech giants report record quarterly earnings",source:"cnn",source_key:"cnn",langue:"en",date:"2025-05-11T14:00:00",topic:"us_tech_earnings",topic_r:"US / Tech / Résultats",poly_prob:0.75,poly_q:"Will S&P 500 tech sector gain >15% in 2025?",quality:"OK"},
  {id:"13",titre:"New diplomatic ties between Morocco and Israel discussed",source:"gdelt",source_key:"gdelt",langue:"en",date:"2025-05-11T15:00:00",topic:"maroc_israel_diplomatie",topic_r:"Maroc / Israël / Diplomatie",poly_prob:0.33,poly_q:"Will Morocco-Israel relations deepen in 2025?",quality:"OK"},
  {id:"14",titre:"Barlamane analyse : la réforme fiscale en débat",source:"barlamane",source_key:"barlamane",langue:"fr",date:"2025-05-11T09:00:00",topic:"maroc_economie_reforme",topic_r:"Maroc / Economie / Réforme",poly_prob:0.72,poly_q:"Will Morocco pass major economic reform in 2025?",quality:"OK"},
  {id:"15",titre:"Lakom : interview exclusive sur l'emploi des jeunes",source:"lakom",source_key:"lakom",langue:"fr",date:"2025-05-11T11:30:00",topic:"maroc_emploi_jeunes",topic_r:"Maroc / Emploi / Jeunes",poly_prob:0.39,poly_q:"Will youth unemployment drop below 25% in Morocco?",quality:"FAIL"},
  {id:"16",titre:"Reuters : l'inflation mondiale ralentit",source:"reuters",source_key:"reuters",langue:"en",date:"2025-05-11T16:00:00",topic:"inflation_mondiale",topic_r:"Monde / Inflation / Économie",poly_prob:0.51,poly_q:"Will global inflation stay below 3.5% in 2025?",quality:"OK"},
  {id:"17",titre:"Akhbarona : le tourisme marocain en plein essor",source:"akhbarona",source_key:"akhbarona",langue:"fr",date:"2025-05-11T07:30:00",topic:"maroc_tourisme",topic_r:"Maroc / Tourisme / Voyage",poly_prob:0.66,poly_q:"Will Morocco welcome >17M tourists in 2025?",quality:"OK"},
  {id:"18",titre:"BBC Sport : le Maroc qualifié pour la CAN 2025",source:"bbc",source_key:"bbc",langue:"en",date:"2025-05-11T17:00:00",topic:"maroc_football_can",topic_r:"Maroc / Football / CAN",poly_prob:0.88,poly_q:"Will Morocco win AFCON 2025?",quality:"OK"},
];

function getPolyColor(prob) {
  if (prob >= 0.65) return {color:'#ef4444',bg:'rgba(239,68,68,0.15)',label:'Probabilité forte',icon:'🔴'};
  if (prob >= 0.45) return {color:'#f59e0b',bg:'rgba(245,158,11,0.15)',label:'Probabilité modérée',icon:'🟠'};
  return {color:'#22c55e',bg:'rgba(34,197,94,0.15)',label:'Probabilité faible',icon:'🟢'};
}

function getLangLabel(code) {
  const map={fr:'🇫🇷 Français',en:'🇬🇧 Anglais',ar:'🇲🇦 Arabe'};
  return map[code] || code;
}

function useAnimatedNumber(target, duration=800) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start=0; const t0=performance.now();
    function step(t) {
      const p=Math.min((t-t0)/duration,1);
      const ease=1-Math.pow(1-p,3);
      setVal(Math.round(start+(target-start)*ease));
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }, [target]);
  return val;
}

// ─── COMPONENTS ────────────────────────────────────────────
function KPICard({icon, value, label, delay}) {
  return (
    <div className="kpi-card anim" style={{animationDelay:delay+'ms'}}>
      <div className="icon">{icon}</div>
      <div className="val">{typeof value==='number' ? value.toLocaleString() : value}</div>
      <div className="lab">{label}</div>
    </div>
  );
}

function SectionTitle({icon, text}) {
  return <div className="sec-title anim"><span>{icon}</span> {text}</div>;
}

function InsightCard({icon, text, delay}) {
  return (
    <div className="insight anim" style={{animationDelay:delay+'ms'}}>
      <div className="ic">{icon}</div>
      <div className="tx" dangerouslySetInnerHTML={{__html:text}}/>
    </div>
  );
}

function TopicChart({data, minArticles}) {
  const topics = useMemo(() => {
    const map={};
    data.forEach(d=>{if(d.topic_r) map[d.topic_r]=(map[d.topic_r]||0)+1;});
    return Object.entries(map).filter(([,c])=>c>=minArticles).sort((a,b)=>b[1]-a[1]).slice(0,12);
  }, [data, minArticles]);
  const max = topics[0]?.[1] || 1;
  return (
    <div className="card-box anim" style={{animationDelay:'200ms'}}>
      <SectionTitle icon="🧠" text="Quels sont les sujets du jour ?"/>
      <p style={{fontSize:'0.8rem',color:'var(--muted)',marginBottom:'0.8rem'}}>
        L'IA regroupe automatiquement les articles par similarité. Plus la barre est longue, plus le sujet est couvert.
      </p>
      {topics.map(([name,count])=>(
        <div className="topic-row" key={name}>
          <span className="name">{name}</span>
          <div className="bar"><div className="bar-in" style={{width:(count/max*100)+'%'}}/></div>
          <span className="num">{count}</span>
        </div>
      ))}
      {!topics.length && <p style={{color:'var(--muted)',fontSize:'0.8rem'}}>Aucun sujet ne correspond au filtre.</p>}
    </div>
  );
}

function PolymarketPanel({data}) {
  const signals = useMemo(() => {
    const map={};
    data.forEach(d=>{
      if(d.poly_prob!=null) {
        if(!map[d.topic]||d.poly_prob>map[d.topic].prob) map[d.topic]={...d,prob:d.poly_prob};
      }
    });
    return Object.values(map).sort((a,b)=>b.prob-a.prob).slice(0,5);
  }, [data]);
  return (
    <div className="card-box anim" style={{animationDelay:'300ms'}}>
      <SectionTitle icon="🎯" text="Que prédisent les marchés ?"/>
      <p style={{fontSize:'0.8rem',color:'var(--muted)',marginBottom:'0.8rem'}}>
        Polymarket est une plateforme où des milliers de personnes parient sur l'issue d'événements réels. La probabilité reflète le consensus du marché.
      </p>
      <div className="poly-legend">
        <span><span className="dot" style={{background:'#ef4444'}}/> Forte (≥65%)</span>
        <span><span className="dot" style={{background:'#f59e0b'}}/> Modérée (45-65%)</span>
        <span><span className="dot" style={{background:'#22c55e'}}/> Faible (&lt;45%)</span>
      </div>
      {signals.map((s,i)=>{
        const pc=getPolyColor(s.prob);
        return (
          <div className="poly-card" key={i} style={{borderLeft:'3px solid '+pc.color}}>
            <div className="poly-head">
              <span className="poly-topic">{s.topic_r}</span>
              <span className="poly-badge" style={{color:pc.color,borderColor:pc.color,background:pc.bg}}>
                {pc.icon} {pc.label}
              </span>
            </div>
            <div className="poly-bar-wrap">
              <div className="poly-track"><div className="poly-fill" style={{width:(s.prob*100)+'%',background:pc.color}}/></div>
              <span className="poly-val" style={{color:pc.color}}>{(s.prob*100).toFixed(1)}%</span>
            </div>
            <div className="poly-q">🏦 {s.poly_q}</div>
          </div>
        );
      })}
      {!signals.length && <p style={{color:'var(--muted)',fontSize:'0.8rem'}}>Aucun signal Polymarket disponible.</p>}
    </div>
  );
}

function LanguagePie({data}) {
  const langs = useMemo(() => {
    const map={};
    data.forEach(d=>{map[d.langue]=(map[d.langue]||0)+1;});
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }, [data]);
  const total = data.length || 1;
  const colors = {fr:'#4f46e5',en:'#06b6d4',ar:'#f59e0b'};
  let acc=0;
  const grads = langs.map(([code,count])=>{const p=count/total*100;const s=acc;acc+=p;return `${colors[code]||'#64748b'} ${s}% ${acc}%`;}).join(',');
  return (
    <div className="card-box anim" style={{animationDelay:'400ms'}}>
      <SectionTitle icon="🌍" text="En quelles langues ?"/>
      <div className="pie-wrap">
        <div className="pie" style={{background:`conic-gradient(${grads})`}}>
          <div className="pie-center">{total} articles</div>
        </div>
        <div className="pie-legend">
          {langs.map(([code,count])=>(
            <div className="pie-leg-item" key={code}>
              <span className="pie-leg-dot" style={{background:colors[code]||'#64748b'}}/>
              <span>{getLangLabel(code)} — {Math.round(count/total*100)}% ({count})</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function TimelineChart({data}) {
  const hours = useMemo(() => {
    const map={};
    data.forEach(d=>{const h=new Date(d.date).getHours();map[h]=(map[h]||0)+1;});
    return Array.from({length:24},(_,h)=>({h,count:map[h]||0}));
  }, [data]);
  const max = Math.max(...hours.map(x=>x.count),1);
  return (
    <div className="card-box anim" style={{animationDelay:'500ms'}}>
      <SectionTitle icon="📈" text="Quand les articles ont-ils été publiés ?"/>
      <div className="tl-wrap">
        {hours.map(({h,count})=>{
          const pct=(count/max*100)||4;
          return (
            <div className="tl-col" key={h}>
              <div className="tl-bar" style={{height:pct+'%'}}/>
              <span className="tl-label">{h}h</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SourceBar({data}) {
  const srcs = useMemo(()=>{
    const map={};
    data.forEach(d=>{map[d.source_key]=(map[d.source_key]||0)+1;});
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  },[data]);
  const max = srcs[0]?.[1] || 1;
  return (
    <div className="card-box anim" style={{animationDelay:'600ms'}}>
      <SectionTitle icon="📡" text="Qui publie le plus ?"/>
      {srcs.map(([s,c])=>{
        const name=SOURCE_NAMES[s]||s;
        return (
          <div className="topic-row" key={s}>
            <span className="name">{name}</span>
            <div className="bar"><div className="bar-in" style={{width:(c/max*100)+'%',background:'linear-gradient(90deg,#06b6d4,#22c55e)'}}/></div>
            <span className="num">{c}</span>
          </div>
        );
      })}
    </div>
  );
}

function KeywordBar({data}) {
  const words = useMemo(()=>{
    const stop=new Set(["the","and","for","avec","dans","pour","les","des","que","qui","une","pas","sur","est","son","cet","ces","leurs","notre","vos","mon","tes","ce","de","du","un","et","en","au","aux","par","plus","moins","très","trop","peu","tout","autre","même","tel","autant","aucun","certains","plusieurs","quelque","chacun","personne","rien","divers","with","you","that","this","from","they","have","had","what","said","each","which","she","does","how","will","about","out","many","then","them","some","her","would","make","like","into","him","has","two","more","very","after","just","where","most","know","take","than","only","think","also","its","over","too","any","may","say","great","help","through","much","before","move","right","means","old","same","tell","follow","came","want","show","around","new","news","today","report","official","says","according","people","government","president","minister","country","world","first","last","year","day","time","state","national","international","between","under","during","without","within","along","following","across","behind","beyond","against","among","toward","towards","upon","near","next","another","every","both","few","such","own","being","were","been","are","is","was","be","do","did","done","doing","get","got","made","come","go","went","see","saw","use","used","find","found","give","gave","work","call","called","try","tried","ask","asked","need","needed","feel","felt","become","became","leave","left","put","mean","meant","keep","kept","let","begin","began","seem","seemed","hear","heard","play","played","run","ran","live","lived","believe","believed","bring","brought","happen","happened","write","wrote","provide","provided","sit","sat","stand","stood","lose","lost","pay","paid","meet","met","include","included","continue","continued","set","learn","learned","change","changed","lead","led","understand","watch","watched","stop","stopped","create","created","speak","spoke","read","allow","allowed","add","added","spend","spent","grow","grew","open","opened","walk","walked","win","won","offer","offered","remember","remembered","love","loved","consider","considered","appear","appeared","buy","bought","wait","waited","serve","served","die","died","send","sent","expect","expected","build","built","stay","stayed","fall","fell","cut","reach","reached","kill","killed","remain","remained"]);
    const map={};
    data.forEach(d=>{
      if(!d.titre) return;
      d.titre.toLowerCase().split(/\s+/).forEach(w=>{
        w=w.replace(/[^a-zàâäéèêëîïôöùûüç]/g,'');
        if(w.length>3 && !stop.has(w)) map[w]=(map[w]||0)+1;
      });
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,12);
  },[data]);
  const max = words[0]?.[1] || 1;
  return (
    <div className="card-box anim" style={{animationDelay:'700ms'}}>
      <SectionTitle icon="🔑" text="Mots les plus fréquents"/>
      {words.map(([w,c])=>[
        <div className="topic-row" key={w}>
          <span className="name">{w}</span>
          <div className="bar"><div className="bar-in" style={{width:(c/max*100)+'%',background:'linear-gradient(90deg,#f59e0b,#ef4444)'}}/></div>
          <span className="num">{c}</span>
        </div>
      ])}
    </div>
  );
}

function QualityPie({data}) {
  const ok = data.filter(d=>d.quality==='OK').length;
  const fail = data.filter(d=>d.quality==='FAIL').length;
  const total = data.length || 1;
  const okPct = Math.round(ok/total*100);
  return (
    <div className="card-box anim" style={{animationDelay:'800ms'}}>
      <SectionTitle icon="🔍" text="Qualité des données"/>
      <div className="pie-wrap">
        <div className="pie" style={{background:`conic-gradient(#22c55e 0% ${okPct}%, #ef4444 ${okPct}% 100%)`}}>
          <div className="pie-center">{okPct}% OK</div>
        </div>
        <div className="pie-legend">
          <div className="pie-leg-item"><span className="pie-leg-dot" style={{background:'#22c55e'}}/><span>✅ Validés — {ok}</span></div>
          <div className="pie-leg-item"><span className="pie-leg-dot" style={{background:'#ef4444'}}/><span>❌ Rejetés — {fail}</span></div>
        </div>
      </div>
    </div>
  );
}

function ArticlesTable({data}) {
  return (
    <div className="card-box anim" style={{animationDelay:'900ms',overflow:'auto'}}>
      <SectionTitle icon="📋" text="Derniers articles"/>
      <table className="tbl">
        <thead><tr><th>Titre</th><th>Source</th><th>Langue</th><th>Sujet</th><th>Signal</th><th>Qualité</th></tr></thead>
        <tbody>
          {data.slice(0,50).map(d=>{
            const pc = d.poly_prob!=null ? getPolyColor(d.poly_prob) : null;
            return (
              <tr key={d.id}>
                <td>{d.titre}</td>
                <td>{SOURCE_NAMES[d.source_key]||d.source_key}</td>
                <td>{getLangLabel(d.langue)}</td>
                <td>{d.topic_r||'—'}</td>
                <td>{pc ? <span style={{color:pc.color,fontWeight:700}}>{(d.poly_prob*100).toFixed(0)}%</span> : '—'}</td>
                <td className={d.quality==='OK'?'status-ok':'status-fail'}>{d.quality}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────
function App() {
  const [selectedSources, setSelectedSources] = useState(ALL_SOURCES);
  const [minArticles, setMinArticles] = useState(1);

  const data = useMemo(()=>MOCK_ARTICLES.filter(d=>selectedSources.includes(d.source_key)),[selectedSources]);
  const okData = useMemo(()=>data.filter(d=>d.quality==='OK'),[data]);

  const totalAnim = useAnimatedNumber(data.length);
  const nSources = new Set(data.map(d=>d.source_key)).size;
  const nTopics = new Set(data.map(d=>d.topic).filter(Boolean)).size;
  const nLangs = new Set(data.map(d=>d.langue)).size;
  const okPct = data.length ? Math.round(okData.length/data.length*100) : 0;

  // Insights
  const topTopic = useMemo(()=>{
    const map={};data.forEach(d=>{if(d.topic_r)map[d.topic_r]=(map[d.topic_r]||0)+1;});
    return Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
  },[data]);
  const topSource = useMemo(()=>{
    const map={};data.forEach(d=>{map[d.source_key]=(map[d.source_key]||0)+1;});
    return Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
  },[data]);
  const topLang = useMemo(()=>{
    const map={};data.forEach(d=>{map[d.langue]=(map[d.langue]||0)+1;});
    return Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
  },[data]);
  const bestSignal = useMemo(()=>{
    const withPoly = data.filter(d=>d.poly_prob!=null);
    if(!withPoly.length) return null;
    return withPoly.reduce((a,b)=>a.poly_prob>b.poly_prob?a:b);
  },[data]);

  return (
    <div id="root">
      <aside className="sidebar">
        <h2>📰 News Intelligence</h2>
        <h3>Date</h3>
        <input type="date" className="date-inp" defaultValue="2025-05-11" />

        <h3>Sources</h3>
        {ALL_SOURCES.map(s=>(
          <label key={s}>
            <input type="checkbox" checked={selectedSources.includes(s)} onChange={e=>{
              if(e.target.checked) setSelectedSources([...selectedSources,s]);
              else setSelectedSources(selectedSources.filter(x=>x!==s));
            }}/>
            {SOURCE_NAMES[s]}
          </label>
        ))}

        <h3>Filtrage</h3>
        <label>Articles min/sujet : {minArticles}</label>
        <input type="range" min="1" max="5" value={minArticles} onChange={e=>setMinArticles(+e.target.value)} style={{width:'100%'}}/>

        <div className="about">
          <strong>ℹ️ À propos</strong><br/>
          Ce dashboard analyse automatiquement les articles de <strong>9 sources</strong> et les regroupe par sujets via IA (BERTopic). Il croise ces données avec les <strong>marchés prédictifs Polymarket</strong>.
        </div>
      </aside>

      <main className="main">
        <div className="main-scroll">
          <div className="header">
            <h1>News Intelligence Dashboard</h1>
            <p>Analyse automatique de l'actualité · 9 sources · Sujets détectés par IA · Signaux des marchés prédictifs<br/>
            <span style={{opacity:0.6}}>Données du 11 mai 2025</span></p>
          </div>

          <div className="kpi-grid">
            <KPICard icon="📄" value={totalAnim} label="Articles analysés" delay={0}/>
            <KPICard icon="📡" value={nSources} label="Sources actives" delay={100}/>
            <KPICard icon="🧠" value={nTopics} label="Sujets détectés" delay={200}/>
            <KPICard icon="🌍" value={getLangLabel(topLang?.[0]).split(' ')[0]} label={nLangs+" langue(s)"} delay={300}/>
            <KPICard icon="✅" value={okPct+"%"} label="Qualité des données" delay={400}/>
          </div>

          <SectionTitle icon="💡" text="Ce qu'il faut retenir"/>
          <div className="grid-2" style={{marginBottom:'1.5rem'}}>
            <div>
              {topTopic && <InsightCard icon="🔥" text={`<strong>Sujet le plus couvert :</strong> ${topTopic[0]} (${topTopic[1]} articles)`} delay={100}/>}
              {topSource && <InsightCard icon="📡" text={`<strong>Source la plus active :</strong> ${SOURCE_NAMES[topSource[0]]||topSource[0]} (${topSource[1]} articles)`} delay={200}/>}
            </div>
            <div>
              {bestSignal && (()=>{
                const pc=getPolyColor(bestSignal.poly_prob);
                return <InsightCard icon="🎯" text={`<strong>Signal marché le plus fort :</strong> <span style="color:${pc.color};font-weight:700">${pc.icon} ${pc.label} — ${(bestSignal.poly_prob*100).toFixed(0)}%</span><br/>Sujet : ${bestSignal.topic_r}`} delay={300}/>;
              })()}
              {topLang && <InsightCard icon="🌍" text={`<strong>Langue principale :</strong> ${getLangLabel(topLang[0])} (${Math.round(topLang[1]/data.length*100)}% des articles)`} delay={400}/>}
            </div>
          </div>

          <div className="grid-2">
            <TopicChart data={okData} minArticles={minArticles}/>
            <PolymarketPanel data={okData}/>
          </div>

          <div className="grid-2">
            <LanguagePie data={okData}/>
            <TimelineChart data={okData}/>
          </div>

          <div className="grid-2">
            <SourceBar data={okData}/>
            <KeywordBar data={okData}/>
          </div>

          <div className="grid-2">
            <QualityPie data={data}/>
            <ArticlesTable data={data}/>
          </div>

          <div style={{textAlign:'center',color:'var(--muted)',fontSize:'0.75rem',padding:'1.5rem 0',borderTop:'1px solid var(--border)',marginTop:'1rem'}}>
            News Intelligence Dashboard · {data.length} articles analysés · Données du 2025-05-11 · 9 sources · Analyse IA + Marchés prédictifs
          </div>
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
